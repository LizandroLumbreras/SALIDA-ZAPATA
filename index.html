async function mostrarProximoFolio() {
  document.getElementById("loaderFolio").style.display = "block";
  document.getElementById("pantalla1").style.display = "none";

  const docRef = db.collection("consecutivos").doc("salidas_zapata");
  const docSnap = await docRef.get();

  let numero = 1;
  if (docSnap.exists) {
    numero = docSnap.data().ultimo || 1;
  }

  const proximo = "PDDZAP - " + String(numero).padStart(4, "0");
  document.getElementById("proximoFolio").textContent = proximo;

  setTimeout(() => {
    document.getElementById("loaderFolio").style.display = "none";
    document.getElementById("pantalla1").style.display = "block";
  }, 300);
}

  async function obtenerFolioConsecutivo() {
  const docRef = db.collection("consecutivos").doc("salidas_zapata");
  const docSnap = await docRef.get();

  let nuevoFolio = 1;

  if (docSnap.exists) {
    const ultimo = docSnap.data().ultimo || 0;
    nuevoFolio = ultimo + 1;
    await docRef.set({ ultimo: nuevoFolio });
  } else {
    await docRef.set({ ultimo: nuevoFolio });
  }

  return nuevoFolio;
}

  if (!fecha || !entrega || !recibe || !destino) {
    alert("Por favor completa todos los campos antes de continuar.");
    return;
  }

  irAPantalla('pantalla2');
}

  let productoSeleccionado = null;

function agregarCantidad(nombre, codigo) {
  productoSeleccionado = { nombre, codigo };
  document.getElementById("nombreProductoSeleccionado").textContent = nombre;
  document.getElementById("inputCantidad").value = "";
  document.getElementById("popupCantidad").style.display = "block";
}

function confirmarCantidad() {
  const cantidad = parseInt(document.getElementById("inputCantidad").value);
  if (!isNaN(cantidad) && cantidad > 0) {
    listaTemporal.push({ ...productoSeleccionado, cantidad });
    actualizarListaTemporal();
    cerrarPopup();
  } else {
    alert("Ingresa una cantidad válida.");
  }
}

  document.getElementById("popupCantidad").style.display = "none";

const listaTemporal = [];

function irAPantalla(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');

}

function actualizarListaTemporal() {
  const ul = document.getElementById("listaTemporal");
  ul.innerHTML = "";
  listaTemporal.forEach(item => {
    const li = document.createElement("li");
    li.textContent = ${item.cantidad} x ${item.nombre} (codigo ${item.codigo});
    ul.appendChild(li);
  });
}
async function finalizarCaptura() {
  if (listaTemporal.length === 0) {
    alert("No hay productos agregados.");
    return;
  }

  const fecha = document.getElementById("fecha").value;
  const entrega = document.getElementById("entrega").value;
  const recibe = document.getElementById("recibe").value;
  const destino = document.getElementById("destino").value;

  const folio = await obtenerFolioConsecutivo();

  const salidaData = {
    folio,
    fecha,
    entrega,
    recibe,
    destino,
    productos: listaTemporal,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection("almacenes/almacen_zapata/salidas").add(salidaData);
    alert(✅ Salida guardada con folio ${folio});
    console.log("Salida:", salidaData);
    // limpiar datos si quieres
    location.reload(); 
  } catch (error) {
    console.error("Error al guardar:", error);
    alert("❌ Ocurrió un error al guardar la salida.");
  }
}
