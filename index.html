<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salida de Inventario - Almacén Zapata</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    .pantalla { display: none; }
    .visible { display: block; }
    button { padding: 10px 20px; margin: 10px; background: #0d47a1; color: white; border: none; border-radius: 5px; cursor: pointer; }
    input, select { padding: 10px; width: 100%; margin: 5px 0; }
    .tarjeta { padding: 10px; margin: 10px; background: white; border-radius: 8px; box-shadow: 0 2px 5px #ccc; cursor: pointer; }
    .resumen { background: white; padding: 10px; margin-top: 20px; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="pantalla1" class="pantalla visible">
    <h2>Datos Generales de la Salida</h2>
    <label>Folio: <input id="folio" readonly /></label>
    <label>Fecha: <input id="fecha" readonly /></label>
    <label>Entrega: <input id="entrega" /></label>
    <label>Recibe: <input id="recibe" /></label>
    <button onclick="irAPantalla2()">Continuar</button>
  </div>

  <div id="pantalla2" class="pantalla">
    <h2>Selecciona Clasificación</h2>
    <div id="clasificaciones"></div>
    <button onclick="volverPantalla1()">Volver</button>
  </div>

  <div id="pantalla3" class="pantalla">
    <h2>Selecciona Artículo</h2>
    <div id="articulos"></div>
    <button onclick="volverPantalla2()">Volver</button>
  </div>

  <div id="pantalla4" class="pantalla">
    <h2>Ingresa Cantidad</h2>
    <p id="detalleProducto"></p>
    <input type="number" id="cantidad" placeholder="Cantidad a salir" />
    <button onclick="agregarProducto()">Agregar</button>
    <button onclick="volverPantalla2()">Agregar Otro</button>
    <button onclick="irAPantallaResumen()">Ver Resumen</button>
  </div>

  <div id="pantalla5" class="pantalla">
    <h2>Resumen de Salida</h2>
    <div class="resumen" id="resumen"></div>
    <button onclick="guardarSalida()">Guardar Salida</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
      authDomain: "inventariopv-643f1.firebaseapp.com",
      projectId: "inventariopv-643f1",
      storageBucket: "inventariopv-643f1.appspot.com",
      messagingSenderId: "96242533231",
      appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const lineas = {
      "REYMA": ["352","355","357"],
      "CONVERMEX": ["5282","5283"],
      "JAGUAR": ["020054","450053"]
    };

    let datosGenerales = {};
    let clasificacionActual = "";
    let productoActual = null;
    let listaProductos = [];

    async function generarFolio() {
      const docRef = db.collection("consecutivos").doc("Almacen_Zapata");
      const docSnap = await docRef.get();
      let folio = 1;
      if (docSnap.exists) {
        folio = (docSnap.data().salidas || 0) + 1;
      }
      await docRef.set({ salidas: folio }, { merge: true });
      document.getElementById("folio").value = folio;
    }

    function irAPantalla2() {
      datosGenerales = {
        folio: document.getElementById("folio").value,
        fecha: new Date().toISOString().split("T")[0],
        entrega: document.getElementById("entrega").value,
        recibe: document.getElementById("recibe").value
      };
      mostrarPantalla("pantalla2");
    }

    function volverPantalla1() { mostrarPantalla("pantalla1"); }
    function volverPantalla2() { mostrarPantalla("pantalla2"); }

    function mostrarPantalla(id) {
      document.querySelectorAll(".pantalla").forEach(div => div.classList.remove("visible"));
      document.getElementById(id).classList.add("visible");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("fecha").value = new Date().toISOString().split("T")[0];
      await generarFolio();

      const clasifCont = document.getElementById("clasificaciones");
      for (const nombre in lineas) {
        const div = document.createElement("div");
        div.className = "tarjeta";
        div.innerText = nombre;
        div.onclick = () => mostrarArticulos(nombre);
        clasifCont.appendChild(div);
      }
    });

    async function mostrarArticulos(clasif) {
      clasificacionActual = clasif;
      const codigos = lineas[clasif];
      const productosSnap = await db.collection("productos").get();
      const cont = document.getElementById("articulos");
      cont.innerHTML = "";
      productosSnap.forEach(doc => {
        const d = doc.data();
        if (codigos.includes(d.Codigo)) {
          const div = document.createElement("div");
          div.className = "tarjeta";
          div.innerText = `${d.Codigo} - ${d.Concepto}`;
          div.onclick = () => seleccionarProducto(d.Codigo, d.Concepto);
          cont.appendChild(div);
        }
      });
      mostrarPantalla("pantalla3");
    }

    function seleccionarProducto(codigo, descripcion) {
      productoActual = { codigo, descripcion };
      document.getElementById("detalleProducto").innerText = `${codigo} - ${descripcion}`;
      document.getElementById("cantidad").value = "";
      mostrarPantalla("pantalla4");
    }

    function agregarProducto() {
      const cantidad = parseFloat(document.getElementById("cantidad").value);
      if (!cantidad || cantidad <= 0) return alert("Cantidad no válida");
      listaProductos.push({ ...productoActual, cantidad });
      alert("Producto agregado");
    }

    function irAPantallaResumen() {
      const resumen = document.getElementById("resumen");
      resumen.innerHTML = "";
      listaProductos.forEach(p => {
        const div = document.createElement("div");
        div.innerText = `${p.codigo} - ${p.descripcion} | Cantidad: ${p.cantidad}`;
        resumen.appendChild(div);
      });
      mostrarPantalla("pantalla5");
    }

    async function guardarSalida() {
      const salida = {
        ...datosGenerales,
        productos: listaProductos,
        timestamp: new Date()
      };
      await db.collection("almacenes").doc("Almacen_Zapata").collection("salidas").add(salida);
      alert("Salida guardada correctamente");
      location.reload();
    }
  </script>
</body>
</html>
