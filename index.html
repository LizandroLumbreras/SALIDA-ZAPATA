    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .pantalla { display: none; }
    .visible { display: block; }
    .tarjeta {
      background: white;
      padding: 20px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      text-align: center;
      font-weight: bold;
    }
    .tarjeta:hover { background: #e0f7fa; }
    .producto {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: white;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .boton-accion {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .boton-accion:hover {
      opacity: 0.9;
    }
  </style>
</head>

<div id="pantalla1" class="pantalla visible">
  <h2>Registrar salida - Datos generales</h2>
  <label>Fecha: <input type="date" id="fecha"></label><br><br>
  <label>Entrega: <input type="text" id="entrega"></label><br><br>
  <label>Recibe: <input type="text" id="recibe"></label><br><br>
  <label>Destino: <input type="text" id="destino"></label><br><br>
  <button class="boton-accion" onclick="irAPantalla('pantalla2')">Continuar</button>
</div>

<div id="pantalla2" class="pantalla">

</div>

<div id="pantalla3" class="pantalla">
  <h2>Categoría REYMA</h2>
  <div class="tarjeta" onclick="mostrarProductos('CHAROLA')">CHAROLA</div>
<div class="tarjeta" onclick="mostrarProductos('CONTENEDOR')">CONTENEDOR</div>
<div class="tarjeta" onclick="mostrarProductos('PLATOS_TERMICOS')">PLATOS TERMICOS</div>
<div class="tarjeta" onclick="mostrarProductos('CHAROLAS_COLORES')">CHAROLAS COLORES</div>
<div class="tarjeta" onclick="mostrarProductos('CONTENEDORES_NEGROS')">CONTENEDORES NEGROS</div>
<div class="tarjeta" onclick="mostrarProductos('VASOS_PLASTICO')">VASOS PLASTICOS</div>
</div>

<div id="pantalla4" class="pantalla">

  <div id="listaProductos"></div>
  <h3>🧾 Lista temporal:</h3>
  <ul id="listaTemporal"></ul>
  <br>
  <button class="boton-accion" onclick="irAPantalla('pantalla3')">➕ Agregar más artículos</button>
  <button class="boton-accion" onclick="irAPantalla('pantalla1')">🔙 Volver al inicio</button>
  <button class="boton-accion" onclick="finalizarCaptura()">✅ Finalizar y guardar</button>
</div>

<script>

  let productos = [];
  let titulo = "Productos";

  if (tipo === 'CHAROLA') {
    productos = productosCharola;
    titulo = "Productos REYMA - CHAROLA";
  } else if (tipo === 'CONTENEDOR') {
    productos = productosContenedor;
    titulo = "Productos REYMA - CONTENEDOR";
  } else if (tipo === 'PLATOS_TERMICOS') {
    productos = productosPlatosTermicos;
    titulo = "Productos REYMA - PLATOS TERMICOS";
  } else if (tipo === 'CHAROLAS_COLORES') {
    productos = productosCharolasColores;
    titulo = "Productos REYMA - CHAROLAS COLORES";
  } else if (tipo === 'CONTENEDORES_NEGROS') {
    productos = productosContenedoresNegros;
    titulo = "Productos REYMA - CONTENEDORES NEGROS";
  } else if (tipo === 'VASOS_PLASTICO') {
    productos = productosVasosPlastico;
    titulo = "Productos REYMA - VASOS PLASTICOS";
  }

  document.getElementById("tituloProductos").textContent = titulo;
  const contenedor = document.getElementById("listaProductos");
  contenedor.innerHTML = "";

  productos.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `<span onclick="agregarCantidad('${p.nombre}', '${p.codigo}')">${p.nombre}</span>`;

    contenedor.appendChild(div);
  });

  irAPantalla('pantalla4');
}

const listaTemporal = [];

function irAPantalla(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');

}

function renderizarProductos() {
  const contenedor = document.getElementById("listaProductos");
  contenedor.innerHTML = "";
  productosCharola.forEach(p => {
    const div = document.createElement("div");
    div.className = "producto";
    div.innerHTML = `
      <span>${p.nombre}</span>
      <button onclick="agregarCantidad('${p.nombre}', '${p.codigo}')">➕</button>
    `;
    contenedor.appendChild(div);
  });
}

function agregarCantidad(nombre, codigo) {
  const cantidad = prompt(`Cantidad para ${nombre}:`);
  const num = parseInt(cantidad);
  if (!isNaN(num) && num > 0) {
    listaTemporal.push({ nombre, codigo, cantidad: num });
    actualizarListaTemporal();
  }
}

function actualizarListaTemporal() {
  const ul = document.getElementById("listaTemporal");
  ul.innerHTML = "";
  listaTemporal.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.cantidad} x ${item.nombre} (codigo ${item.codigo})`;
    ul.appendChild(li);
  });
}

function finalizarCaptura() {
  if (listaTemporal.length === 0) {
    alert("No hay productos agregados.");
    return;
  }
  alert("✅ Captura lista para guardar. Aquí iría la lógica de Firebase y firmas.");
  console.log("Lista final:", listaTemporal);
}
