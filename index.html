
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrar salida - Almacén Zapata</title>
</head>
<body>
  <h2>Registrar salida - Almacén Zapata</h2>
  <p>📌 Próximo folio: <strong id="proximoFolio">Cargando...</strong></p>
  <label>Fecha:
    <input type="date" id="fecha" readonly>
  </label>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCK5nb6u2CGRJ8AB1aPlRn54b97bdeAFeM",
      authDomain: "inventariopv-643f1.firebaseapp.com",
      projectId: "inventariopv-643f1",
      storageBucket: "inventariopv-643f1.appspot.com",
      messagingSenderId: "96242533231",
      appId: "1:96242533231:web:aae75a18fbaf9840529e9a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function mostrarProximoFolio() {
      const folioRef = db.collection("consecutivos").doc("salidas_zapata");
      const folioDoc = await folioRef.get();
      let numero = 1;
      if (folioDoc.exists) {
        numero = folioDoc.data().ultimo || 1;
      }
      const proximo = "PDDZAP - " + String(numero).padStart(4, "0");
      document.getElementById("proximoFolio").textContent = proximo;
    }

    document.addEventListener("DOMContentLoaded", () => {
      // Corregir fecha con formato aceptado por input[type=date]
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById("fecha").value = `${yyyy}-${mm}-${dd}`;

      mostrarProximoFolio();
    });
  </script>
</body>
</html>
